<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>배드민턴 운영용 사이트</title>
  <meta name="description" content="배드민턴 코트 배치, 참석자 관리, 참여 횟수 누적을 한 번에 처리하는 운영용 사이트입니다." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="canonical" href="https://hyjang0816.github.io/" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="ko_KR" />
  <meta property="og:site_name" content="배드민턴 운영용 사이트" />
  <meta property="og:title" content="배드민턴 운영용 사이트" />
  <meta property="og:description" content="배드민턴 코트 배치, 참석자 관리, 참여 횟수 누적을 한 번에 처리하는 운영용 사이트입니다." />
  <meta property="og:url" content="https://hyjang0816.github.io/" />
  <meta property="og:image" content="https://cdn.pixabay.com/photo/2020/10/04/13/00/shuttlecocks-5626284_1280.jpg" />
  <meta property="og:image:alt" content="컬러 셔틀콕이 놓인 배드민턴 라켓 이미지" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="배드민턴 운영용 사이트" />
  <meta name="twitter:description" content="배드민턴 코트 배치, 참석자 관리, 참여 횟수 누적을 한 번에 처리하는 운영용 사이트입니다." />
  <meta name="twitter:image" content="https://cdn.pixabay.com/photo/2020/10/04/13/00/shuttlecocks-5626284_1280.jpg" />
  <link rel="stylesheet" href="assets/css/styles.css" />
  <link rel="stylesheet" href="assets/css/touch-drag.css" />
  <link rel="stylesheet" href="assets/css/weight-system.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <div>
        <h1>배드민턴 운영용 사이트</h1>
        <div class="subtitle">게임 횟수와 1~10 가중치를 고려해 코트를 공정하게 자동 편성합니다.</div>
      </div>
      <div class="actions">
        <button class="btn" id="undoBtn" disabled>실행 취소</button>
        <button class="btn" id="clearCourtsBtn">코트 비우기</button>
        <button class="btn danger-outline" id="resetAllBtn">전체 초기화</button>
        <button class="btn primary" id="completeGameBtn">전체 게임 종료</button>
      </div>
    </header>

    <div class="save-message" id="saveMessage" aria-live="polite"></div>
    <div class="stats" id="stats"></div>

    <main class="main">
      <section class="court-section">
        <div class="section-header">
          <div class="section-title">코트 편성</div>
          <div class="section-actions">
            <div class="badge" id="activeSlotBadge">참석자를 끌거나 자리를 선택하세요</div>
            <button class="btn primary-soft" id="recommendPlacementBtn">공정 자동 배치</button>
            <button class="btn" id="addCourtBtn">코트 추가</button>
          </div>
        </div>
        <div class="court-list" id="courtList"></div>
      </section>

      <aside class="side-panel">
        <div class="card participant-card">
          <div class="panel-header participant-header">
            <div>
              <div class="section-title small-title">전체 참석자 목록</div>
              <div class="helper">PC는 이름 영역을 끌고, 태블릿·모바일은 오른쪽 점 아이콘을 길게 눌러 끌어 놓으세요.</div>
            </div>
            <input id="participantSearch" class="search-input" type="search" placeholder="이름 검색" autocomplete="off" />
          </div>
          <div class="panel-body participant-scroll"><div class="participant-list" id="participantList"></div></div>
        </div>

        <div class="card placed-card">
          <div class="panel-header">
            <div>
              <div class="section-title small-title">미배치 인원 <span id="unassignedCount"></span></div>
              <div class="helper">현재 쉬고 있는 참가자이며, 참여 횟수가 적은 순으로 표시됩니다.</div>
            </div>
          </div>
          <div class="panel-body"><div class="placed-list" id="placedParticipantList"></div></div>
        </div>

        <div class="card participant-input-card">
          <div class="panel-header"><div class="section-title small-title">참석자 입력</div></div>
          <div class="panel-body">
            <label for="playerInput" class="field-label">이름 입력</label>
            <div class="input-row">
              <textarea id="playerInput" rows="3" placeholder="쉼표 또는 줄바꿈으로 여러 명 입력"></textarea>
              <button class="btn" id="addParticipantsBtn">추가</button>
            </div>
            <div class="helper">동명이인은 별도 참가자로 등록할 수 있으며, 가중치는 1~10 범위이고 기본값은 5입니다.</div>
          </div>
        </div>
      </aside>
    </main>
  </div>

  <div class="drag-ghost" id="dragGhost" aria-hidden="true"></div>
  <div class="mobile-bottom-bar">
    <button class="btn primary mobile-complete" id="mobileCompleteGameBtn">전체 게임 종료</button>
  </div>

  <script src="assets/js/script.js"></script>
  <script src="assets/js/allow-duplicate-placement.js"></script>
  <script src="assets/js/unassigned-waitlist.js"></script>
  <script src="assets/js/touch-longpress-drag.js"></script>
  <script src="assets/js/weight-system.js"></script>
  <script src="assets/js/weight-auto-button.js"></script>
</body>
</html>
