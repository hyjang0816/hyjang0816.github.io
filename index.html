<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배드민턴 운영용 사이트</title>
  <meta name="description" content="배드민턴 코트 배치, 참석자 관리, 참여 횟수 누적을 한 번에 처리하는 운영용 사이트입니다." />
  <meta name="theme-color" content="#0f172a" />
  <link rel="canonical" href="https://hyjang0816.github.io/" />
  <link rel="stylesheet" href="assets/css/styles.css" />
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div>
        <h1>배드민턴 운영용 사이트</h1>
        <div class="subtitle">참여 횟수와 직전 경기 여부를 고려해 공정하게 코트를 편성합니다.</div>
      </div>
      <div class="actions">
        <button class="btn" id="undoBtn" disabled>실행 취소</button>
        <button class="btn" id="clearCourtsBtn">코트 비우기</button>
        <button class="btn danger-outline" id="resetAllBtn">전체 초기화</button>
        <button class="btn primary" id="completeGameBtn">전체 게임 종료</button>
      </div>
    </div>

    <div class="save-message" id="saveMessage" aria-live="polite"></div>
    <div class="stats" id="stats"></div>

    <div class="main">
      <section>
        <div class="section-header">
          <div class="section-title">코트 편성</div>
          <div class="section-actions">
            <div class="badge" id="activeSlotBadge">자리를 먼저 선택하세요</div>
            <button class="btn primary" id="recommendPlacementBtn">공정 자동 배치</button>
            <button class="btn" id="addCourtBtn">코트 추가</button>
          </div>
        </div>
        <div class="court-list" id="courtList"></div>
      </section>

      <aside>
        <div class="card input-card">
          <div class="panel-header"><div class="section-title small">참석자 입력</div></div>
          <div class="panel-body">
            <label for="playerInput">이름 입력</label>
            <div class="input-row">
              <textarea id="playerInput" rows="3" placeholder="쉼표 또는 줄바꿈으로 여러 명 입력"></textarea>
              <button class="btn" id="addParticipantsBtn">추가</button>
            </div>
            <div class="helper">동명이인은 각각 별도 ID로 관리됩니다. 같은 이름을 여러 번 입력해도 구분됩니다.</div>
          </div>
        </div>

        <div class="card participant-card">
          <div class="panel-header participant-header">
            <div>
              <div class="section-title small">참석자 목록</div>
              <div class="helper">검색 후 이름을 눌러 선택한 코트 자리에 배치하세요.</div>
            </div>
            <input id="participantSearch" class="search-input" type="search" placeholder="이름 검색" />
          </div>
          <div class="panel-body"><div class="participant-list" id="participantList"></div></div>
        </div>
      </aside>
    </div>
  </div>

  <div class="mobile-bottom-bar">
    <button class="btn" id="mobileUndoBtn" disabled>↩ 취소</button>
    <button class="btn primary" id="mobileCompleteBtn">전체 게임 종료</button>
  </div>

  <script src="assets/js/script.js"></script>
</body>
</html>
